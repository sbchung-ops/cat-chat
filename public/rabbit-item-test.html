<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>Rabbit Item Test</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 18px;
      background: #efe8dc;
      color: #4f493f;
      font-family: "Segoe UI", "Malgun Gothic", sans-serif;
    }
    h1 { margin: 0 0 12px; font-size: 18px; }
    h2 { margin: 22px 0 10px; font-size: 14px; }
    h2:first-of-type { margin-top: 0; }
    .grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(120px, 1fr));
      gap: 8px;
    }
    .card {
      min-height: 112px;
      padding: 6px;
      border: 1px solid #d4c3a5;
      border-radius: 8px;
      background: #fffdf8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
    }
    .stage {
      height: 84px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    .label {
      width: 100%;
      margin-top: 3px;
      font-size: 10px;
      line-height: 1.25;
      color: #716757;
      text-align: center;
      word-break: keep-all;
    }
    .cat-figure {
      position: relative;
      margin: 0 auto;
      filter: drop-shadow(0 3px 4px rgba(120, 100, 80, 0.22));
    }
    .cat-layer { position: absolute; image-rendering: auto; pointer-events: none; }
  </style>
</head>
<body>
  <h1>Rabbit Item Test</h1>
  <main id="grid"></main>
  <script src="cat.js"></script>
  <script>
    const cats = [
      ['cat_17_rabbit_white', 'white'],
      ['cat_19_rabbit_brown', 'brown'],
      ['cat_21_rabbit_grey', 'grey'],
    ];
    const items = [
      [null, 'none'],
      ['acc_other_01_round_glasses', 'glasses'],
      ['acc_other_02_monocle', 'monocle'],
      ['acc_other_03_mustache', 'mustache'],
      ['acc_other_06_sprout_pot', 'sprout'],
      ['acc_other_07_carrot', 'carrot'],
      ['acc_other_08_star', 'star'],
      ['acc_other_09_heart', 'heart'],
      ['acc_other_10_broom', 'broom'],
    ];

    fetch('assets/manifest.json')
      .then((r) => r.json())
      .then((list) => {
        window.CatRender.setCatalog(list);
        const gridFor = (forceRabbitFold) => `
          <section class="grid">
            ${items.map(([item, itemName]) =>
              cats.map(([cat, catName]) => `
                <section class="card" data-cat="${cat}" data-item="${item || ''}">
                  <div class="stage">${window.CatRender.catHTML({ cat, hat: null, neck: null, item, forceRabbitFold })}</div>
                  <div class="label">${catName} / ${itemName}</div>
                </section>
              `).join('')
            ).join('')}
          </section>
        `;
        const grid = document.getElementById('grid');
        grid.innerHTML = `
          <h2>Original ears</h2>
          ${gridFor(false)}
          <h2>Ears back</h2>
          ${gridFor(true)}
        `;
        document.title = 'Rabbit Item Test Ready';
      });
  </script>
</body>
</html>
