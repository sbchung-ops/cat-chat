<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>냥냥 이벤트</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <script src="nyan.js"></script>
  <script>
    // 전용 투명 이벤트 창: 메인 IPC 신호를 받아 냥냥 이벤트만 재생 (항상 클릭 통과)
    (function () {
      let cats = [];
      fetch('assets/manifest.json')
        .then((r) => r.json())
        .then((list) => { cats = list.filter((i) => i.category === 'cats'); })
        .catch(() => {});

      let timer = null;
      function play() {
        const old = document.querySelector('.nyan-event');
        if (old) { clearTimeout(timer); old.remove(); }
        const layer = window.NyanFX.build(cats);
        document.body.appendChild(layer);
        timer = setTimeout(() => layer.remove(), window.NyanFX.TOTAL_MS);
      }

      if (window.overlayAPI && window.overlayAPI.onNyanPlay) window.overlayAPI.onNyanPlay(play);
    })();
  </script>
</body>
</html>
