<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>measuring</title></head>
<body>
<pre id="out">measuring...</pre>
<script>
// 고양이 PNG에서 "턱 밑 목선"을 실측한다.
// 눈높이 아래에서 실루엣 폭이 가장 좁아지는 행 = 목. 그 행의 중심 x = 목 중심.
async function measure() {
  const list = await (await fetch('assets/manifest.json')).json();
  const cats = list.filter(x => x.category === 'cats');
  const result = {};

  for (const cat of cats) {
    const img = new Image();
    img.src = 'assets/' + cat.file;
    await img.decode();
    const W = img.naturalWidth, H = img.naturalHeight;
    const cv = document.createElement('canvas');
    cv.width = W; cv.height = H;
    const ctx = cv.getContext('2d', { willReadFrequently: true });
    ctx.drawImage(img, 0, 0);
    const d = ctx.getImageData(0, 0, W, H).data;
    const A = (x, y) => d[(y * W + x) * 4 + 3];

    // 행별 실루엣 세그먼트 (measure.html과 동일)
    const rows = [];
    let y0 = -1, y1 = -1, maxW = 0;
    for (let y = 0; y < H; y++) {
      const runs = [];
      let start = -1;
      for (let x = 0; x < W; x++) {
        const on = A(x, y) > 40;
        if (on && start < 0) start = x;
        if (!on && start >= 0) { runs.push([start, x - 1]); start = -1; }
      }
      if (start >= 0) runs.push([start, W - 1]);
      let L = -1, R = -1, w = 0;
      if (runs.length) { L = runs[0][0]; R = runs[runs.length - 1][1]; w = R - L + 1; }
      rows.push({ runs, L, R, w });
      if (w > 0) { if (y0 < 0) y0 = y; y1 = y; if (w > maxW) maxW = w; }
    }

    // 귀 밑 (measure.html과 동일한 방식)
    let earBase = -1, sawTwoRuns = false;
    for (let y = y0; y <= y1; y++) {
      const meaningful = rows[y].runs.filter(r => r[1] - r[0] > 2);
      if (meaningful.length >= 2) sawTwoRuns = true;
      if (sawTwoRuns && meaningful.length === 1 && rows[y].w >= 0.4 * maxW) { earBase = y; break; }
    }
    if (earBase < 0) {
      for (let y = y0; y <= y1; y++) if (rows[y].w >= 0.5 * maxW) { earBase = y; break; }
    }

    // 눈높이 (measure.html과 동일한 방식)
    const bboxH = y1 - y0 + 1;
    const zoneStart = Math.round(earBase + 0.05 * bboxH);
    const zoneEnd = Math.min(y1, Math.round(earBase + 0.35 * bboxH));
    let eyeY = -1, best = 0;
    for (let y = zoneStart; y <= zoneEnd; y++) {
      const row = rows[y];
      if (row.w <= 0) continue;
      const xa = Math.round(row.L + 0.2 * row.w);
      const xb = Math.round(row.R - 0.2 * row.w);
      let c = 0;
      for (let x = xa; x <= xb; x++) {
        const i = (y * W + x) * 4;
        if (d[i + 3] > 200 && d[i] + d[i + 1] + d[i + 2] < 260) c++;
      }
      if (c > best) { best = c; eyeY = y; }
    }
    if (eyeY < 0 || best < 4) eyeY = Math.round(earBase + 0.18 * bboxH);

    const faceUnit = eyeY - earBase;

    // 머리 중심 x (눈높이 행)
    const er = rows[eyeY];
    const headCxPx = (er.L + er.R) / 2;

    // 중심 run 폭 계산 헬퍼
    function centerRun(y) {
      for (const r of rows[y].runs) if (headCxPx >= r[0] && headCxPx <= r[1]) return r;
      // 중심이 빈 곳이면 가장 가까운 run
      let bestR = null, bd = 1e9;
      for (const r of rows[y].runs) {
        const dd = headCxPx < r[0] ? r[0] - headCxPx : headCxPx - r[1];
        if (dd < bd) { bd = dd; bestR = r; }
      }
      return bestR;
    }
    const headWpx = er.w;

    // 눈 아래 0.5~2.4 faceUnit 구간의 "중심 run 폭/중심" 프로파일 (0.1fu 간격)
    const profile = [];
    for (let k = 5; k <= 24; k++) {
      const y = Math.round(eyeY + (k / 10) * faceUnit);
      if (y > y1 - 2) break;
      const r = centerRun(y);
      profile.push({
        fu: k / 10,
        w: r ? +((r[1] - r[0] + 1) / headWpx).toFixed(3) : 0,
        cx: r ? +(((r[0] + r[1]) / 2) / W).toFixed(4) : null,
      });
    }

    // 목선 후보: 0.7~2.0fu 구간에서 중심 run 폭 최소
    let neckFu = -1, minW = 1e9, neckCx = headCxPx / W;
    for (const p of profile) {
      if (p.fu < 0.7 || p.fu > 2.0 || p.w <= 0) continue;
      if (p.w * headWpx < minW) { minW = p.w * headWpx; neckFu = p.fu; neckCx = p.cx; }
    }

    result[cat.slug] = {
      eyeY: +(eyeY / H).toFixed(4),
      faceUnitH: +(faceUnit / H).toFixed(4),
      neckFu, neckCx,
      neckW_ratio_headW: +(minW / headWpx).toFixed(3),
      profile,
    };
  }
  document.getElementById('out').textContent = JSON.stringify(result, null, 1);
  document.title = 'done';
}
measure();
</script>
</body>
</html>
